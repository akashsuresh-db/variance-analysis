command:
  - "python"
  - "-m"
  - "uvicorn"
  - "app:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "8000"

env:
  # Lakebase connection — set these after attaching the Lakebase resource to the app
  # (Compute > Apps > <your-app> > Edit > Add resource > Database)
  # or hardcode the values from your Lakebase instance details.
  - name: PGHOST
    value: "<your-lakebase-host>.database.cloud.databricks.com"
  - name: PGPORT
    value: "5432"
  - name: PGDATABASE
    value: "databricks_postgres"
  # PGUSER = app service principal client ID (found in Settings > Identity & Access > Service Principals)
  - name: PGUSER
    value: "<your-app-sp-client-id>"
  # PGPASSWORD is fetched at runtime via Databricks SDK OAuth token (see server/db.py)

  # Finance Genie Space ID — from the URL of your Genie space: /genie/spaces/<SPACE_ID>
  - name: GENIE_SPACE_ID
    value: "<your-genie-space-id>"

  # Foundation Model endpoint
  - name: SERVING_ENDPOINT
    value: "databricks-claude-sonnet-4-5"

  # SP credentials for per-user Row-Level Security routing
  # Replace these with your own SP client IDs and secrets.
  # See README.md § SP-Routing Service Principals for setup instructions.
  # analyst SP — restricted to filtered view only
  - name: SP_ANALYST_CLIENT_ID
    value: "<your-analyst-sp-client-id>"
  - name: SP_ANALYST_CLIENT_SECRET
    value: "<your-analyst-sp-client-secret>"
  # manager SP — full access to main.finance_demo.*
  - name: SP_MANAGER_CLIENT_ID
    value: "<your-manager-sp-client-id>"
  - name: SP_MANAGER_CLIENT_SECRET
    value: "<your-manager-sp-client-secret>"
