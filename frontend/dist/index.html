<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgentBricks Finance Assistant</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
             background: #0d1117; color: #e2e8f0; line-height: 1.6; }

      /* ── Layout ─────────────────────────────────────────────────────── */
      .root { display: flex; height: 100vh; overflow: hidden; }

      /* ── Sidebar ─────────────────────────────────────────────────────── */
      .sidebar { width: 260px; min-width: 260px; background: #161b22;
                 border-right: 1px solid #21262d;
                 display: flex; flex-direction: column; overflow: hidden; }

      .sidebar-header { padding: 18px 14px 14px; border-bottom: 1px solid #21262d; }
      .logo { display: flex; align-items: center; gap: 10; margin-bottom: 14px; }
      .logo-icon { font-size: 26px; color: #388bfd; }
      .logo-title { font-size: 15px; font-weight: 700; color: #f0f6fc; letter-spacing: -0.3px; }
      .logo-sub { font-size: 11px; color: #6e7681; margin-top: 1px; }

      .new-chat-btn { display: flex; align-items: center; gap: 7px; width: 100%;
                      padding: 8px 12px; background: #1f6feb; border: none; border-radius: 7px;
                      color: #fff; font-size: 13px; font-weight: 500; cursor: pointer;
                      transition: background 0.15s; }
      .new-chat-btn:hover { background: #388bfd; }

      .section-label { padding: 12px 14px 4px; font-size: 10px; font-weight: 600;
                       color: #6e7681; text-transform: uppercase; letter-spacing: 0.07em; }

      .session-list { flex: 1; overflow-y: auto; padding: 4px 6px; }
      .session-list::-webkit-scrollbar { width: 4px; }
      .session-list::-webkit-scrollbar-thumb { background: #21262d; border-radius: 4px; }

      .session-item { position: relative; padding: 9px 10px; border-radius: 7px;
                      cursor: pointer; margin-bottom: 2px; transition: background 0.1s; }
      .session-item:hover { background: #1c2128; }
      .session-item:hover .delete-btn { opacity: 1; }
      .session-item-active { background: #21262d !important; }

      .session-title { font-size: 13px; font-weight: 500; color: #c9d1d9;
                       overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
                       padding-right: 22px; }
      .session-meta { display: flex; gap: 6px; font-size: 11px; color: #6e7681; margin-top: 2px; }
      .delete-btn { position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
                    background: none; border: none; color: #6e7681; cursor: pointer;
                    padding: 4px; opacity: 0; display: flex; align-items: center;
                    transition: opacity 0.1s, color 0.1s; border-radius: 4px; }
      .delete-btn:hover { color: #f85149; }

      .empty-hint { padding: 16px 8px; font-size: 12px; color: #6e7681; text-align: center; }

      .sidebar-footer { padding: 10px 14px; border-top: 1px solid #21262d;
                        font-size: 10px; color: #6e7681; }

      /* ── Main ───────────────────────────────────────────────────────── */
      .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

      .chat-header { padding: 14px 24px; border-bottom: 1px solid #21262d;
                     background: #161b22; flex-shrink: 0; }
      .chat-title { font-size: 14px; font-weight: 600; color: #f0f6fc; }
      .chat-subtitle { font-size: 11px; color: #6e7681; margin-top: 1px; }

      /* ── Messages ───────────────────────────────────────────────────── */
      .messages { flex: 1; overflow-y: auto; padding: 28px 24px;
                  display: flex; flex-direction: column; gap: 24px; }
      .messages::-webkit-scrollbar { width: 5px; }
      .messages::-webkit-scrollbar-thumb { background: #21262d; border-radius: 4px; }

      .msg-row { display: flex; align-items: flex-start; gap: 12px; }
      .msg-row-user { justify-content: flex-end; }
      .msg-row-bot { justify-content: flex-start; }

      .bot-avatar { width: 30px; height: 30px; border-radius: 50%;
                    background: linear-gradient(135deg, #1f6feb 0%, #388bfd 100%);
                    display: flex; align-items: center; justify-content: center;
                    flex-shrink: 0; color: #fff; margin-top: 2px; }

      .bubble-col { display: flex; flex-direction: column; max-width: 76%; }
      .bot-label { font-size: 11px; color: #6e7681; margin-bottom: 5px; font-weight: 500; }

      .bubble { padding: 12px 16px; border-radius: 14px; font-size: 14px;
                word-break: break-word; }
      .bubble-user { background: #1f6feb; color: #fff;
                     border-bottom-right-radius: 4px; }
      .bubble-bot  { background: #161b22; color: #c9d1d9;
                     border: 1px solid #21262d; border-bottom-left-radius: 4px; }

      /* ── User text ──────────────────────────────────────────────────── */
      .user-text { white-space: pre-wrap; line-height: 1.6; }

      /* ── Streaming text + cursor ─────────────────────────────────────── */
      .streaming-text { white-space: pre-wrap; line-height: 1.7; color: #c9d1d9;
                        font-size: 14px; }
      .cursor { display: inline-block; width: 2px; height: 14px;
                background: #388bfd; margin-left: 2px; vertical-align: middle;
                animation: blink 0.8s step-end infinite; }
      @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

      /* ── Loading dots ───────────────────────────────────────────────── */
      .dots { display: flex; gap: 5px; align-items: center; padding: 4px 2px; }
      .dots span { width: 7px; height: 7px; border-radius: 50%; background: #6e7681;
                   animation: bounce 1.2s infinite ease-in-out; }
      .dots span:nth-child(2) { animation-delay: 0.15s; }
      .dots span:nth-child(3) { animation-delay: 0.3s; }
      @keyframes bounce { 0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
                          40% { transform: scale(1); opacity: 1; } }

      .error-text { color: #f85149; font-size: 13px; }

      /* ── Welcome screen ─────────────────────────────────────────────── */
      .welcome { flex: 1; display: flex; flex-direction: column; align-items: center;
                 justify-content: center; text-align: center; padding: 40px 32px;
                 max-width: 580px; margin: 0 auto; }
      .welcome-icon { font-size: 48px; color: #388bfd; margin-bottom: 16px; }
      .welcome-title { font-size: 22px; font-weight: 700; color: #f0f6fc; margin-bottom: 10px; }
      .welcome-desc { font-size: 14px; color: #8b949e; line-height: 1.7; margin-bottom: 24px; }
      .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
      .suggestion-chip { padding: 7px 13px; background: #161b22; border: 1px solid #21262d;
                         border-radius: 20px; color: #c9d1d9; font-size: 12.5px; cursor: pointer;
                         transition: background 0.15s, border-color 0.15s; }
      .suggestion-chip:hover { background: #1c2128; border-color: #388bfd; color: #f0f6fc; }

      /* ── Input area ─────────────────────────────────────────────────── */
      .input-area { padding: 14px 24px 18px; border-top: 1px solid #21262d;
                    background: #161b22; flex-shrink: 0; }
      .input-wrapper { display: flex; gap: 8px; align-items: flex-end;
                       background: #0d1117; border: 1px solid #30363d;
                       border-radius: 12px; padding: 10px 12px;
                       transition: border-color 0.15s; }
      .input-wrapper:focus-within { border-color: #388bfd; }
      .textarea { flex: 1; background: transparent; border: none; outline: none;
                  color: #e2e8f0; font-size: 14px; line-height: 1.6; resize: none;
                  font-family: inherit; max-height: 160px; overflow-y: auto; }
      .textarea::placeholder { color: #6e7681; }
      .textarea:disabled { opacity: 0.5; }
      .send-btn { background: #1f6feb; border: none; border-radius: 8px; color: #fff;
                  cursor: pointer; padding: 7px 10px; display: flex; align-items: center;
                  flex-shrink: 0; transition: background 0.15s; }
      .send-btn:hover:not(.send-btn-disabled) { background: #388bfd; }
      .send-btn-disabled { opacity: 0.35; cursor: not-allowed; }
      .input-hint { font-size: 11px; color: #6e7681; margin-top: 6px; padding-left: 2px; }

      /* ── Markdown ───────────────────────────────────────────────────── */
      .md-h1 { font-size: 18px; font-weight: 700; color: #f0f6fc;
               margin: 16px 0 6px; line-height: 1.3; }
      .md-h2 { font-size: 15px; font-weight: 600; color: #f0f6fc;
               margin: 14px 0 5px; line-height: 1.3; }
      .md-h3 { font-size: 14px; font-weight: 600; color: #e2e8f0;
               margin: 12px 0 4px; line-height: 1.3; }
      .md-p { margin: 6px 0; line-height: 1.75; color: #c9d1d9; }
      .md-p:first-child { margin-top: 0; }
      .md-p:last-child { margin-bottom: 0; }
      .md-strong { font-weight: 700; color: #f0f6fc; }
      .md-em { font-style: italic; color: #c9d1d9; }
      .md-ul { padding-left: 18px; margin: 6px 0; color: #c9d1d9; }
      .md-ol { padding-left: 18px; margin: 6px 0; color: #c9d1d9; }
      .md-li { margin: 3px 0; line-height: 1.65; }
      .md-pre { background: #0d1117; border: 1px solid #21262d; border-radius: 8px;
                padding: 12px 14px; margin: 10px 0; overflow-x: auto; }
      .md-code-block { font-family: 'SF Mono', 'Fira Code', monospace;
                       font-size: 12.5px; color: #79c0ff; line-height: 1.55; }
      .md-code-inline { background: #1c2128; border: 1px solid #21262d;
                        border-radius: 4px; padding: 1px 6px;
                        font-family: 'SF Mono', 'Fira Code', monospace;
                        font-size: 12.5px; color: #79c0ff; }
      .md-table-wrap { overflow-x: auto; margin: 10px 0; border-radius: 8px;
                       border: 1px solid #21262d; }
      .md-table { border-collapse: collapse; font-size: 13px; width: 100%; }
      .md-th { padding: 8px 14px; background: #1c2128; font-weight: 600;
               color: #e2e8f0; text-align: left; border-bottom: 1px solid #21262d;
               white-space: nowrap; }
      .md-td { padding: 7px 14px; color: #c9d1d9; border-bottom: 1px solid #161b22; }
      .md-tr:last-child .md-td { border-bottom: none; }
      .md-tr:hover .md-td { background: #1c2128; }
      .md-blockquote { border-left: 3px solid #388bfd; margin: 8px 0;
                       padding-left: 14px; color: #8b949e; }
      .md-hr { border: none; border-top: 1px solid #21262d; margin: 14px 0; }
    </style>
    <script type="module" crossorigin src="/assets/index-BbWQH3KG.js"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
